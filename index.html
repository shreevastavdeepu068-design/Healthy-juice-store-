<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthy Juice Store</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
html{scroll-behavior:smooth;}
body{
background:#f0fdf4;
overflow-x:hidden; /* 🔥 FIX ZOOM ISSUE */
max-width:100%;
}

*{box-sizing:border-box;}

img{
max-width:100%;
}

.card{transition:.3s;}
.card:hover{transform:translateY(-8px);}

.btn3d{
transition:.2s;
box-shadow:0 6px 0 #166534;
}
.btn3d:active{
transform:translateY(4px);
box-shadow:0 2px 0 #166534;
}

#menuBox{display:none;}
</style>
</head>

<body>

<!-- NAV -->
<nav class="bg-green-700 text-white p-4 flex justify-between">
<h1>🥤 Juice Store</h1>
<button onclick="toggleMenu()">⋮</button>
</nav>

<div id="menuBox" class="bg-white p-3">
<p onclick="scrollTo('home')">Home</p>
<p onclick="scrollTo('menu')">Menu</p>
<p onclick="scrollTo('contact')">Contact</p>
<p onclick="toggleCart()">Cart</p>
<p onclick="adminLogin()">Admin Login</p> <!-- 🔥 ADDED -->
</div>

<!-- HERO -->
<section id="home" class="h-[400px] flex items-center justify-center text-center text-white"
style="background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('https://images.unsplash.com/photo-1553531889-56cc480ac5cb?w=1200');background-size:cover;background-position:center;">
<div>
<h1 class="text-3xl md:text-6xl font-bold">Healthy Juice Store</h1>
<p>Fresh Juices & Shakes</p>

<button class="btn3d bg-green-500 px-5 py-2 mt-4 rounded"
onclick="scrollTo('menu')">
Order Now
</button>
</div>
</section>

<!-- MENU -->
<section id="menu" class="p-6">
<h2 class="text-2xl font-bold text-center mb-4">Menu</h2>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">

<div class="card bg-white p-4 rounded shadow">
Banana Shake
<button class="btn3d bg-green-600 text-white px-3 py-1 mt-2"
onclick="addCart('Banana Shake')">Add</button>
</div>

<div class="card bg-white p-4 rounded shadow">
Mango Shake
<button class="btn3d bg-green-600 text-white px-3 py-1 mt-2"
onclick="addCart('Mango Shake')">Add</button>
</div>

<div class="card bg-white p-4 rounded shadow">
Cold Coffee
<button class="btn3d bg-green-600 text-white px-3 py-1 mt-2"
onclick="addCart('Cold Coffee')">Add</button>
</div>

</div>
</section>

<!-- CART -->
<div id="cartBox" class="hidden fixed right-0 top-0 w-72 h-full bg-white p-4 shadow">
<h3 class="text-xl font-bold">Cart</h3>
<ul id="cartList"></ul>

<button onclick="whatsapp()" class="btn3d bg-green-600 text-white w-full mt-3 py-2">
Order
</button>
</div>

<!-- CONTACT -->
<section id="contact" class="bg-green-700 text-white p-10 text-center">
<h2>Contact</h2>
<p>📞 7827543597</p>
<p>📧 shreevastavdeepu068@gmail.com</p>
</section>

<!-- ADMIN PANEL -->
<div id="admin" class="hidden fixed bottom-0 w-full bg-white p-3 border-t">
<input id="pname" placeholder="Product Name" class="border p-2">
<button onclick="addProduct()" class="bg-green-600 text-white px-3 py-2">
Add Product
</button>
</div>

<!-- OTP LOGIN PANEL -->
<div id="otpBox" class="hidden fixed top-0 left-0 w-full bg-white p-4 shadow">
<input id="phone" placeholder="Enter Phone Number" class="border p-2 w-full">
<button onclick="sendOTP()" class="bg-green-600 text-white px-3 py-2 mt-2">
Send OTP
</button>

<input id="otp" placeholder="Enter OTP" class="border p-2 w-full mt-2">
<button onclick="verifyOTP()" class="bg-black text-white px-3 py-2 mt-2">
Verify OTP
</button>
</div>

<!-- ================= JS ================= -->
<script>

let cart = [];
let isAdmin = false;

/* CART */
function addCart(item){
cart.push(item);
renderCart();
}

function renderCart(){
document.getElementById("cartList").innerHTML =
cart.map((i,index)=>`
<li class="flex justify-between border-b py-1">
${i}
<button onclick="removeItem(${index})">❌</button>
</li>
`).join("");
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("hidden");
}

/* WHATSAPP */
function whatsapp(){
if(cart.length === 0){
alert("Cart empty!");
return;
}

window.open(
"https://wa.me/917827543597?text=Order:%0A"+cart.join("%0A")
);
}

/* MENU */
function toggleMenu(){
let m=document.getElementById("menuBox");
m.style.display = (m.style.display==="block")?"none":"block";
}

function scrollTo(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* ADMIN LOGIN */
function adminLogin(){
let pass = prompt("Enter Admin Password");

if(pass==="admin123"){
isAdmin=true;
document.getElementById("admin").classList.remove("hidden");
alert("Admin Login Success");
} else {
alert("Wrong Password");
}
}

function addProduct(){
if(!isAdmin){
alert("Admin only");
return;
}

let name=document.getElementById("pname").value;
alert("Product Added: "+name);
}

/* OTP SYSTEM (READY HOOK FOR FIREBASE) */
function sendOTP(){
document.getElementById("otpBox").classList.remove("hidden");
alert("OTP sent (Firebase connect required)");
}

function verifyOTP(){
alert("OTP verified (demo mode)");
}

/* FIREBASE INIT */
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};

firebase.initializeApp(firebaseConfig);

</script>

</body>
</html>
