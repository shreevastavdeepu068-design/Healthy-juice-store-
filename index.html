<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giftables App UI</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-purple { background-color: #4c1d95; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <!-- Header / Search Bar -->
    <header class="custom-purple p-4 text-white">
        <div class="relative">
            <input type="text" id="searchInput" placeholder="Search for 'juice'" 
                   class="w-full p-3 pl-10 rounded-xl text-gray-800 outline-none shadow-lg">
            <span class="absolute left-3 top-3 text-gray-400">🔍</span>
        </div>
    </header>

    <!-- Filter & Sort -->
    <div class="flex gap-2 p-4 overflow-x-auto">
        <button class="px-4 py-1 border rounded-full bg-white">Filter ⚙️</button>
        <button class="px-4 py-1 border rounded-full bg-white">Sort by ▾</button>
        <button class="px-4 py-1 border rounded-full bg-white">Birthday</button>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="grid grid-cols-2 gap-4 p-4">
        <!-- Product 1 -->
        <div class="bg-white p-3 rounded-2xl shadow-sm border">
            <img src="https://via.placeholder.com/150" class="w-full h-32 object-cover rounded-lg">
            <h3 class="text-sm font-semibold mt-2">Java Stainless Tumbler</h3>
            <p class="text-green-600 font-bold text-sm">₹159 <span class="line-through text-gray-400 font-normal">₹285</span></p>
            <button onclick="addToCart('Java Tumbler')" class="w-full mt-2 border border-green-600 text-green-600 font-bold py-1 rounded-lg hover:bg-green-600 hover:text-white transition">
                ADD TO CART
            </button>
        </div>
        <!-- Product 2 -->
        <div class="bg-white p-3 rounded-2xl shadow-sm border">
            <img src="https://via.placeholder.com/150" class="w-full h-32 object-cover rounded-lg">
            <h3 class="text-sm font-semibold mt-2">Glass Cans (500ml)</h3>
            <p class="text-green-600 font-bold text-sm">₹179 <span class="line-through text-gray-400 font-normal">₹399</span></p>
            <button onclick="addToCart('Glass Cans')" class="w-full mt-2 border border-green-600 text-green-600 font-bold py-1 rounded-lg hover:bg-green-600 hover:text-white transition">
                ADD TO CART
            </button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-white border-t p-3 flex justify-around text-xs font-bold text-gray-500">
        <div class="text-orange-600">🎁 Giftables</div>
        <div>📱 All Categories</div>
    </nav>

    <!-- JavaScript Functionality -->
    <script>
        function addToCart(productName) {
            alert(productName + " added to cart!");
            console.log(productName + " added.");
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            console.log("Searching for: " + e.target.value);
            // यहाँ आप API या फिल्टर फंक्शन जोड़ सकते हैं
        });
    </script>
</body>
</html>
