<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthy Juice Store</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase (ready hooks) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
html{scroll-behavior:smooth;}
body{
background:#f0fdf4;
overflow-x:hidden;   /* 🔥 FIX 1: zoom/side scroll remove */
}

.hero{
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1553531889-56cc480ac5cb?w=1200');
background-size:cover;
background-position:center;
}

.card{transition:.3s;}
.card:hover{transform:translateY(-8px);}

.btn3d{
transition:.2s;
box-shadow:0 6px 0 #166534;
}
.btn3d:active{
transform:translateY(4px);
box-shadow:0 2px 0 #166534;
}

#menuBox{display:none;}

/* 🔥 FIX 2: prevent overflow inside cards/text */
*{
box-sizing:border-box;
}
img{
max-width:100%;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="bg-green-700 text-white p-4 flex justify-between">
<h1>🥤 Juice Store</h1>
<button onclick="toggleMenu()">⋮</button>
</nav>

<div id="menuBox" class="bg-white p-3">
<p onclick="scrollTo('home')">Home</p>
<p onclick="scrollTo('menu')">Menu</p>
<p onclick="scrollTo('contact')">Contact</p>
<p onclick="toggleCart()">Cart</p>
</div>

<!-- HERO -->
<section id="home" class="hero h-[400px] flex items-center justify-center text-center text-white px-4">
<div>
<h1 class="text-3xl md:text-6xl font-bold">Healthy Juice Store</h1> <!-- 🔥 FIX 3 -->
<p>Fresh Juices & Shakes</p>
<button class="btn3d bg-green-500 px-5 py-2 mt-4 rounded" onclick="scrollTo('menu')">
Order Now
</button>
</div>
</section>

<!-- MENU -->
<section id="menu" class="p-6">
<h2 class="text-2xl font-bold text-center mb-4">Menu</h2>

<!-- 🔥 FIX 4: responsive grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">

<div class="card bg-white p-4 rounded shadow">
Banana Shake
<button class="btn3d bg-green-600 text-white px-3 py-1 mt-2"
onclick="addCart('Banana Shake')">Add</button>
</div>

<div class="card bg-white p-4 rounded shadow">
Mango Shake
<button class="btn3d bg-green-600 text-white px-3 py-1 mt-2"
onclick="addCart('Mango Shake')">Add</button>
</div>

<div class="card bg-white p-4 rounded shadow">
Cold Coffee
<button class="btn3d bg-green-600 text-white px-3 py-1 mt-2"
onclick="addCart('Cold Coffee')">Add</button>
</div>

</div>
</section>

<!-- CART -->
<div id="cartBox" class="hidden fixed right-0 top-0 w-72 h-full bg-white p-4 shadow">
<h3>Cart</h3>
<ul id="cartList"></ul>
<button onclick="whatsapp()" class="btn3d bg-green-600 text-white w-full mt-3 py-2">
Order
</button>
</div>

<!-- CONTACT -->
<section id="contact" class="bg-green-700 text-white p-10 text-center px-4">
<h2>Contact</h2>
<p>📞 7827543597</p>
<p>📧 shreevastavdeepu068@gmail.com</p>

<a class="btn3d bg-white text-green-700 px-4 py-2 mt-3 inline-block"
href="https://wa.me/917827543597">
WhatsApp
</a>
</section>

<!-- ADMIN -->
<div id="admin" class="hidden fixed bottom-0 w-full bg-white p-3 border-t">
<input id="pname" placeholder="Product" class="border p-1">
<button onclick="addProduct()" class="bg-green-600 text-white px-3 py-1">Add</button>
</div>

<script>

let cart=[];

function addCart(item){
cart.push(item);
render();
}

function render(){
document.getElementById("cartList").innerHTML =
cart.map(i=>`<li>${i}</li>`).join("");
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("hidden");
}

function whatsapp(){
window.open("https://wa.me/917827543597?text=Order:%0A"+cart.join("%0A"));
}

function toggleMenu(){
let m=document.getElementById("menuBox");
m.style.display=m.style.display==="block"?"none":"block";
}

function scrollTo(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};
firebase.initializeApp(firebaseConfig);

function addProduct(){
let name=document.getElementById("pname").value;
alert("Product Added: "+name);
}

</script>

</body>
</html>
